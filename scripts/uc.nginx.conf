# uc SPA(用户中心 H5 单页)静态服务 — CTID 107(uc.xingninghuyu.com)。
# 边缘机(Debian)做 TLS 终止 + 反代 → 本机 :80;本机只服务静态。
# 由 scripts/deploy-uc.sh 安装到 /etc/nginx/http.d/default.conf。
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/uc;
    index index.html;

    # uc SPA 用 hash 路由;静态资源按路径取,其余回退 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源弱缓存(页面简单、无构建指纹,避免长缓存导致更新不可见)。
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }
}
